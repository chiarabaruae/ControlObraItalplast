<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Control de Obras - Italplast</title>
    <meta name="description" content="Suite operativa para control de obras de instalación de aberturas - Italplast" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles/login.css" />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <!-- ===== LOGIN SHELL ===== -->
    <main class="login-shell" id="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="login-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M15 3h3a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-3" />
            <path d="M10 17l5-5-5-5" />
            <path d="M15 12H3" />
          </svg>
        </div>

        <header class="login-header">
          <p class="eyebrow">Italplast</p>
          <h1 id="login-title">Control de Obras</h1>
          <p>Inicia sesión para continuar</p>
        </header>

        <form class="login-form" id="login-form" novalidate>
          <label class="field">
            <span>Usuario</span>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Tu usuario"
              required
            />
          </label>

          <label class="field">
            <span>Contraseña</span>
            <span class="password-control">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Tu contraseña"
                required
              />
              <button class="icon-button" type="button" id="toggle-password" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </span>
          </label>

          <button class="submit-button" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 3h3a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-3" />
              <path d="M10 17l5-5-5-5" />
              <path d="M15 12H3" />
            </svg>
            <span>Iniciar sesión</span>
          </button>

          <p class="password-help">Me olvidé de mi contraseña, cambiar mi contraseña.</p>

          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <!-- ===== APP SHELL (rendered by JS after login) ===== -->
    <main class="app-layout" id="app-shell" hidden></main>

    <script type="module" src="./scripts/app.js"></script>
  </body>
</html>
