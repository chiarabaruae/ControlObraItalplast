<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Control de Avances de Obra</title>
    <link rel="stylesheet" href="./styles/login.css" />
  </head>
  <body>
    <main class="login-shell" id="login-shell">
      <section class="login-card" aria-labelledby="login-title">
        <div class="login-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M15 3h3a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-3" />
            <path d="M10 17l5-5-5-5" />
            <path d="M15 12H3" />
          </svg>
        </div>

        <header class="login-header">
          <p class="eyebrow">Italplast</p>
          <h1 id="login-title">Control de Obras</h1>
          <p>Inicia sesión para continuar</p>
        </header>

        <form class="login-form" id="login-form" novalidate>
          <label class="field">
            <span>Usuario</span>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Tu usuario"
              required
            />
          </label>

          <label class="field">
            <span>Contraseña</span>
            <span class="password-control">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Tu contraseña"
                required
              />
              <button class="icon-button" type="button" id="toggle-password" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </span>
          </label>

          <button class="submit-button" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 3h3a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3h-3" />
              <path d="M10 17l5-5-5-5" />
              <path d="M15 12H3" />
            </svg>
            <span>Iniciar sesión</span>
          </button>

          <p class="password-help">Me olvidé de mi contraseña, cambiar mi contraseña.</p>

          <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <main class="app-shell" id="app-shell" hidden>
      <aside class="sidebar" aria-label="Menú principal">
        <div class="sidebar-brand">
          <span>Italplast</span>
          <strong>Control Obras</strong>
        </div>

        <nav class="side-nav" aria-label="Secciones">
          <button class="side-nav-item is-active" type="button" data-view="dashboard">Dashboard</button>
          <button class="side-nav-item" type="button" data-view="clientes">Clientes</button>
          <button class="side-nav-item" type="button" data-view="obras">Obras</button>
          <button class="side-nav-item" type="button" data-view="tareas">Tareas</button>
          <button class="side-nav-item" type="button" data-view="gantt">Gantt</button>
        </nav>
      </aside>

      <section class="main-panel" aria-labelledby="main-title">
        <header class="main-header">
          <div>
            <p class="eyebrow" id="main-eyebrow">Panel operativo</p>
            <h1 id="main-title">Dashboard</h1>
          </div>
          <div class="header-actions">
            <button class="ghost-button" type="button" id="refresh-view">Actualizar</button>
            <button class="primary-button" type="button" id="new-record" hidden>Nuevo</button>
            <span class="user-chip" id="user-chip"></span>
          </div>
        </header>

        <div class="workspace" id="workspace">
          <div class="loading-card">Cargando panel...</div>
        </div>
      </section>
    </main>

    <dialog class="record-modal" id="record-modal">
      <form class="modal-card" id="record-form" method="dialog">
        <header class="modal-header">
          <div>
            <p class="eyebrow" id="modal-eyebrow">Registro</p>
            <h2 id="modal-title">Nuevo registro</h2>
          </div>
          <button class="icon-close" type="button" id="close-modal" aria-label="Cerrar">×</button>
        </header>
        <div class="modal-grid" id="modal-fields"></div>
        <p class="form-status" id="modal-status" role="status" aria-live="polite"></p>
        <footer class="modal-actions">
          <button class="ghost-button" type="button" id="cancel-modal">Cancelar</button>
          <button class="primary-button" type="submit">Guardar</button>
        </footer>
      </form>
    </dialog>

    <script src="./scripts/login.js"></script>
  </body>
</html>
